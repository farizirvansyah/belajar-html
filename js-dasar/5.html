<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paket Pengirman</title>
</head>

<body>
    <form action="" method="post">
        <label for="operator">Isi Kota Tujuan</label>
        <br>
        <input type="text" name="" id="operator">
        <br>
        <label for="berat">Isi Berat</label>
        <br>
        <input type="number" id="berat" placeholder="Masukkan Berat (g)">
        <!-- <select id="operator" style="text-align: center;" required>
            <option value="">-</option>
            <option value="bogor">Bogor</option>
            <option value="depok">Depok</option>
            <option value="lainnya">Lainnya</option>
        </select> -->
        <button id="btn-tujuan">Hitung</button>
    </form>
    <h1 id="hasil">Tarifnya adalah sebesar: <b>0</b></h1>

    <script>
        let btn = document.getElementById("btn-tujuan");
        btn.addEventListener("click", hitung);

        function hitung(e) {
            e.preventDefault(); // Mencegah agar web browser melakukan refresh otomatis
            let btn_tujuan = document.getElementById("btn-tujuan");
            let opt = document.getElementById("operator").value.toLowerCase().trim();
            let berat = parseInt(document.getElementById("berat").value.trim());
            let perGram = berat / 1000;
            let hasil = 0;
            const kotanya = ["bogor", "depok", "jakarta", "bandung", "bekasi"];

            if (berat < 0) {
                alert("Tidak Boleh Minus")
                window.location.reload();
            }

            if (kotanya.includes(opt) && opt == "bogor") hasil = perGram * 2000;
            else if (kotanya.includes(opt) && opt == "depok") hasil = perGram * 4000;
            else if (kotanya.includes(opt) && opt == "jakarta" || kotanya.includes(opt) &&
                opt == "bandung" || kotanya.includes(opt) && opt == "bekasi") hasil = perGram * 6000;
            else {
                hasil = "<span style:'color:red'>Maaf, kota tidak tersedia</span>";
            }


            // if (opt == "bogor") hasil = perGram * 2000;
            // else if (opt == "depok") hasil = perGram * 4000;
            // else {
            //     hasil = perGram * 6000;
            // }
            // Format Penulisan Rupiah 
            // const formatRupiah = new Intl.NumberFormat('id-ID', {
            //     style: 'currency',
            //     currency: 'IDR',
            //     minimumFractionDigits: 2
            // }).format(hasil);
            document.getElementById('hasil').innerHTML =
                `Tarifnya adalah sebesar: <b>${hasil.toLocaleString("id-ID")}</b>`;
        }
    </script>
</body>

</html>
