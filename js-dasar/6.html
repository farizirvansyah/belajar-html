<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Mahasiswa</title>
</head>

<body>
    <table border="1">
        <thead>
            <tr>
                <th>No.</th>
                <th>NIM</th>
                <th>Nama</th>
                <th>Prodi</th>
                <th>Gender</th>
                <th>Alamat</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table-mhs">
            <!-- Datanya akan dirender disini -->
        </tbody>
    </table>

    <script>
        const students = [{
                nim: "2211500001",
                nama: "Toni Sunjoyo",
                prodi: "Teknik Informatika",
                gender: "Laki-laki",
                alamat: "Kampung Sawah"
            },
            {
                nim: "2211500002",
                nama: "Susi Pujiastuti",
                prodi: "Sistem Informasi",
                gender: "Perempuan",
                alamat: "Cinere"
            }
        ];
        let table_mhs = document.getElementById("table-mhs");
        table_mhs.innerHTML = "";
        for (let i = 0; i < students.length; i++) {
            let baris = document.createElement("tr");
            baris.innerHTML = `
            <td>${i+1}</td>
            <td>${students[i].nim}</td>
            <td>${students[i].nama}</td>
            <td>${students[i].prodi}</td>
            <td>${students[i].gender}</td>
            <td>${students[i].alamat}</td>
            <td><button type="button">Hapus</button></td>
            `;
            table_mhs.appendChild(baris);
            // const element = $students[i];

        }
    </script>
</body>

</html>
