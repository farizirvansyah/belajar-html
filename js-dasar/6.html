<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Mahasiswa</title>
</head>

<body>
    <table border="1">
        <thead>
            <tr>
                <th>No.</th>
                <th>NIM</th>
                <th>Nama</th>
                <th>Prodi</th>
                <th>Gender</th>
                <th>Alamat</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table-mhs">
            <!-- Datanya akan dirender disini -->
        </tbody>
    </table>

    <script>
        const students = [{
                nim: "2211500001",
                nama: "Toni Sunjoyo",
                prodi: "Teknik Informatika",
                gender: "Laki-laki",
                alamat: "Kampung Sawah"
            },
            {
                nim: "2211500002",
                nama: "Susi Pujiastuti",
                prodi: "Sistem Informasi",
                gender: "Perempuan",
                alamat: "Cinere"
            }
        ];
        let table_mhs = document.getElementById("table-mhs");

        table_mhs.innerHTML = "";

        for (let index = 0; index < students.length; index++) {
            let baris = document.createElement("tr");
            baris.innerHTML = `
            <td>${index+1}</td>
            <td>${students[index].nim}</td>
            <td>${students[index].nama}</td>
            <td>${students[index].prodi}</td>
            <td>${students[index].gender}</td>
            <td>${students[index].alamat}</td>
            <td><button class='btn-hapus' data-hapus='${index}'">Hapus</button></td>
            `;
            table_mhs.appendChild(baris);
        }
        // Aksi Hapus
        table_mhs.addEventListener("click", function (e) {
            if (event.target.classList.contains('btn-hapus')) {
                let indexData = e.target.getAttribute('data-hapus');
                students.splice(indexData, 1);
                table_mhs.innerHTML = "";

                for (let index = 0; index < students.length; index++) {
                    let baris = document.createElement("tr");
                    baris.innerHTML = `
            <td>${index+1}</td>
            <td>${students[index].nim}</td>
            <td>${students[index].nama}</td>
            <td>${students[index].prodi}</td>
            <td>${students[index].gender}</td>
            <td>${students[index].alamat}</td>
            <td><button class='btn-hapus' data-hapus='${index}'">Hapus</button></td>
            `;
                    table_mhs.appendChild(baris);
                }
            }
        });
    </script>
</body>

</html>
