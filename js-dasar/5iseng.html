<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paket Pengirman</title>
</head>

<body>
    <form action="" method="post">
        <input type="number" id="in-berat" placeholder="Masukkan Berat (kg)">
        <select id="operator" style="text-align: center;" required>
            <option value="">-</option>
            <option value="bogor">Bogor</option>
            <option value="depok">Depok</option>
            <option value="lainnya">Lainnya</option>
        </select>
        <button id="btn-hitung">Hitung</button>
    </form>
    <h1 id="hasil">Tarifnya adalah sebesar: <b>0</b></h1>

    <script>
        let btn = document.getElementById("btn-hitung");
        btn.addEventListener("click", hitung);

        function hitung(e) {
            e.preventDefault(); // Mencegah agar web browser melakukan refresh otomatis
            // Deklarasi Variabel
            let berat = parseFloat(document.getElementById("in-berat").value);
            let opt = document.getElementById("operator").value;
            let hasil = 0;
            // Validasi Input
            if (isNaN(berat) || berat <= 0) {
                alert("Masukkan berat (kg)!");
                return;
            }
            // Logic
            if (opt == "bogor") hasil = berat * 2000;
            else if (opt == "depok") hasil = berat * 4000;
            else if (opt == "lainnya") hasil = berat * 6000;
            else {
                hasil = 0;
            }
            // Format Penulisan Rupiah 
            // const formatRupiah = new Intl.NumberFormat('id-ID', {
            //     style: 'currency',
            //     currency: 'IDR',
            //     minimumFractionDigits: 2
            // }).format(hasil);

            document.getElementById('hasil').innerHTML = `Tarifnya adalah sebesar: <b>Rp${hasil.toLocaleString("id-ID")}</b>`;
        }
    </script>
</body>

</html>
