<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar Membuat Tabel HTML #2</title>
    <style>
      body {
        background-color: honeydew;
        font-family: Arial, Helvetica, sans-serif;
      }

      table {
        background-color: aliceblue;
        border: 1px solid black;
        border-collapse: collapse;
        width: 100%;
      }
      th {
        background-color: aqua;
        border: 1px solid black;
        border-collapse: collapse;
        padding: 8px;
        text-align: center;
      }
      td {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 8px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th colspan="3" bgcolor="yellow">Produk Unggulan</th>
      </tr>
      <tr>
        <td rowspan="4">
          <img src="bibit.png" width="200" />
        </td>
      </tr>
      <tr>
        <td>Nama</td>
        <td>Benih Kode</td>
      </tr>
      <tr>
        <td>Harga</td>
        <td>Rp192.000</td>
      </tr>
      <tr>
        <td>Fitur</td>
        <td>
          <ul>
            <li>Dilengkapi Dokumentasi</li>
            <li>Ukuran: 31MB</li>
            <li>Masa Tanam: 6 Bulan</li>
            <li>Lisensi: MIT</li>
          </ul>
        </td>
      </tr>
    </table>
  </body>
</html>
