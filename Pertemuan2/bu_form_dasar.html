<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulir Pendaftaran #2</title>
    <style>
      body {
        background-color: honeydew;
        font-family: Arial, sans-serif;
        margin: 20px;
        display: flex;
        justify-content: center;
      }
      .container {
        background-color: aliceblue;
        width: 100%;
        max-width: 600px;
        margin-top: 50px;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 20px;
      }
      label.main-label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="email"],
      input[type="date"],
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      fieldset {
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px 15px;
        margin: 0;
      }
      legend {
        font-weight: bold;
        color: #333;
        padding: 0 5px;
      }
      .option-group {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-top: 5px;
      }
      .option-item {
        display: flex;
        align-items: center;
      }
      .option-item input {
        margin-right: 8px;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form action="" method="post">
        <div class="form-group">
          <label for="nama_lengkap">Nama Lengkap</label>
          <input
            type="text"
            name="nama_lengkap"
            id="nama_lengkap"
            placeholder="Isi Nama Anda!"
            required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Isi Email Anda!"
            required />
        </div>

        <div class="form-group">
          <label for="Tanggal_Lahir">Tanggal Lahir</label>
          <input type="date" name="Tanggal_Lahir" id="Tanggal_Lahir" required />
        </div>

        <div class="form-group">
          <label>Jenis Kelamin</label>
          <div class="radio-group">
            <input
              type="radio"
              name="Jenis_Kelamin"
              id="laki_laki"
              value="Laki-laki"
              required />
            <label for="laki_laki">Laki-laki</label>
            <input
              type="radio"
              name="Jenis_Kelamin"
              id="perempuan"
              value="Perempuan" />
            <label for="perempuan">Perempuan</label>
          </div>
        </div>

        <div class="form-group">
          <label for="Agama">Agama</label>
          <select name="Agama" id="Agama" required>
            <option value="" disabled selected>-- PILIH AGAMA ANDA --</option>
            <option value="Islam">Islam</option>
            <option value="Kristen">Kristen</option>
            <option value="Katolik">Katolik</option>
            <option value="Hindu">Hindu</option>
            <option value="Buddha">Buddha</option>
            <option value="Khonghucu">Khonghucu</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>

        <div class="form-group">
          <label>Hobi</label>
          <div class="radio-group">
            <input
              type="checkbox"
              name="Hobi[]"
              id="menggambar"
              value="menggambar" />
            <label for="menggambar">Menggambar</label>

            <input
              type="checkbox"
              name="Hobi[]"
              id="bernyanyi"
              value="bernyanyi" />
            <label for="bernyanyi">Bernyanyi</label>

            <input type="checkbox" name="Hobi[]" id="mancing" value="mancing" />
            <label for="mancing">Mancing</label>

            <input
              type="checkbox"
              name="Hobi[]"
              id="main_bola"
              value="main_bola" />
            <label for="main_bola">Main Bola</label>

            <input
              type="checkbox"
              name="Hobi[]"
              id="berenang"
              value="berenang" />
            <label for="berenang">Berenang</label>
          </div>
        </div>

        <button type="submit">Kirim</button>
      </form>
    </div>
  </body>
</html>
